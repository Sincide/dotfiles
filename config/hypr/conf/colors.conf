# Dynamic Hyprland Colors Generated by Matugen

# Color Definitions
$primary = rgb(d8bafa)
$primary_container = rgb(543b72)
$secondary = rgb(cfc1da)
$secondary_container = rgb(4c4357)
$tertiary = rgb(f2b7c0)
$surface = rgb(151218)
$surface_variant = rgb(4a454e)
$background = rgb(151218)
$error = rgb(ffb4ab)
$outline = rgb(958e99)
$outline_variant = rgb(4a454e)

# Text Colors
$on_primary = rgb(3c245a)
$on_secondary = rgb(362d40)
$on_surface = rgb(e8e0e8)
$on_background = rgb(e8e0e8)

# Window Colors
general {
    col.active_border = $primary
    col.inactive_border = $outline_variant
}

# Group Colors
group {
    col.border_active = $primary
    col.border_inactive = $outline_variant
    col.border_locked_active = $tertiary
    col.border_locked_inactive = $outline
}

# Miscellaneous Colors
misc {
    background_color = $background
    col.splash = $primary
} 