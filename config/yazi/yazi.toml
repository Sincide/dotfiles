[manager]
# Show hidden files by default (toggle with .)
show_hidden = true

# More user-friendly sort order (directories first, name case-insensitive)
sort_by = "natural"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true

# Use icons to make it easier to identify file types
show_icons = true

# Improved navigation experience
linemode = "size"
show_symlinks = true

[preview]
# Try to show previews whenever possible
cache_dir = ""
script = "~/.config/yazi/preview.sh"
max_width = 1920
max_height = 1080
image_filter = "triangle"
image_quality = 75

[opener]
edit = [
    { run = 'nano "$@"', block = true, for = "unix" },
    { run = 'code "%*"', orphan = true, for = "windows" }
]
open = [
    { run = 'xdg-open "$@"', for = "linux" },
    { run = 'open "$@"', for = "macos" },
    { run = 'start "%1"', for = "windows" }
]
reveal = [
    { run = 'nautilus "$1"', for = "linux" },
    { run = 'open -R "$1"', for = "macos" },
    { run = 'explorer /select,%1', for = "windows" }
]


[tasks]
micro_workers = 5
macro_workers = 10
bizarre_retry = 5

[input]
# Make history a bit larger for convenience
cd_history = 100
file_history = 100 