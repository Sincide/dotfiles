# Dynamic Hyprland Colors Generated by Matugen

# Color Definitions
$primary = rgb(ffb3b5)
$primary_container = rgb(723338)
$secondary = rgb(e6bdbd)
$secondary_container = rgb(5d3f40)
$tertiary = rgb(e6c08d)
$surface = rgb(1a1111)
$surface_variant = rgb(524343)
$background = rgb(1a1111)
$error = rgb(ffb4ab)
$outline = rgb(9f8c8c)
$outline_variant = rgb(524343)

# Text Colors
$on_primary = rgb(561d23)
$on_secondary = rgb(44292a)
$on_surface = rgb(f0dede)
$on_background = rgb(f0dede)

# Window Colors
general {
    col.active_border = $primary
    col.inactive_border = $outline_variant
}

# Group Colors
group {
    col.border_active = $primary
    col.border_inactive = $outline_variant
    col.border_locked_active = $tertiary
    col.border_locked_inactive = $outline
}

# Miscellaneous Colors
misc {
    background_color = $background
    col.splash = $primary
} 