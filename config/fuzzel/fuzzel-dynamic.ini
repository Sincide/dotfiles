# Dynamic Fuzzel Configuration Generated by Matugen

[main]
terminal=kitty
layer=overlay
exit-on-keyboard-focus-loss=yes
icon-theme=Papirus
icons-enabled=yes
fields=filename,name,generic,comment,categories,keywords
show-actions=yes
cache=~/.cache/fuzzel/cache

[dmenu]
exit-immediately-if-empty=no

[key-bindings]
cancel=Escape Control+c
execute=Return KP_Enter Control+m
execute-or-next=Tab
cursor-left=Left Control+b
cursor-left-word=Control+Left Mod1+b
cursor-right=Right Control+f
cursor-right-word=Control+Right Mod1+f
cursor-home=Home Control+a
cursor-end=End Control+e
delete-prev=BackSpace
delete-prev-word=Mod1+BackSpace Control+BackSpace
delete-next=Delete
delete-next-word=Mod1+d Control+Delete
extend-to-word-boundary=Control+w
prev=Up Control+p
next=Down Control+n
custom-1=Mod1+1
custom-2=Mod1+2
custom-3=Mod1+3
custom-4=Mod1+4
custom-5=Mod1+5
custom-6=Mod1+6
custom-7=Mod1+7
custom-8=Mod1+8
custom-9=Mod1+9
custom-10=Mod1+0
custom-11=Mod1+exclam
custom-12=Mod1+at
custom-13=Mod1+numbersign
custom-14=Mod1+dollar
custom-15=Mod1+percent
custom-16=Mod1+dead_circumflex
custom-17=Mod1+ampersand
custom-18=Mod1+asterisk
custom-19=Mod1+parenleft

[colors]
background=111318ff
text=e2e2e9ff
match=adc6ffff
selection=2b4678ff
selection-text=d8e2ffff
selection-match=bfc6dcff
border=8e9099ff

[border]
width=2
radius=8

[font]
name=JetBrainsMono Nerd Font
size=12 