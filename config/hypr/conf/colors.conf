# Dynamic Hyprland Colors Generated by Matugen

# Color Definitions
$primary = rgb(e5b6f2)
$primary_container = rgb(5d386b)
$secondary = rgb(d4c0d7)
$secondary_container = rgb(514254)
$tertiary = rgb(f5b7b4)
$surface = rgb(161217)
$surface_variant = rgb(4c444d)
$background = rgb(161217)
$error = rgb(ffb4ab)
$outline = rgb(988e97)
$outline_variant = rgb(4c444d)

# Text Colors
$on_primary = rgb(452253)
$on_secondary = rgb(392c3d)
$on_surface = rgb(e9e0e7)
$on_background = rgb(e9e0e7)

# Window Colors
general {
    col.active_border = $primary
    col.inactive_border = $outline_variant
}

# Group Colors
group {
    col.border_active = $primary
    col.border_inactive = $outline_variant
    col.border_locked_active = $tertiary
    col.border_locked_inactive = $outline
}

# Miscellaneous Colors
misc {
    background_color = $background
    col.splash = $primary
} 