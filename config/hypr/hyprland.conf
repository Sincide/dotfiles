# Source environment variables
source = ~/.config/hypr/env.conf

# Source monitor configuration (will be set by install script)
source = ~/.config/hypr/monitors.conf

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=,preferred,auto,1

# See https://wiki.hyprland.org/Configuring/Keywords/ for more

# Execute your favorite apps at launch
exec-once = ~/.config/hypr/scripts/xdg-portal-hyprland
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = waybar
# exec-once = mako     # Only needed if mako is installed (not default, we use dunst)
exec-once = swww init
exec-once = ~/.config/hypr/scripts/wallpaper
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = dunst
exec-once = hyprpaper
exec-once = nm-applet --indicator
exec-once = blueman-applet
#exec-once = steam -silent -minimized -cef-disable-gpu

# Input configuration
input {
    # Keyboard layout settings
    kb_layout = se  # Set to Swedish layout
    
    # Other keyboard options (left blank for default)
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    # Enable numlock by default
    numlock_by_default = true

    # Mouse behavior settings
    follow_mouse = 1  # 1 to follow the cursor for focus

    touchpad {
        # Disable natural scrolling (false: traditional scrolling)
        natural_scroll = false
    }

    # Input sensitivity (0 means no modification)
    sensitivity = 0
}

# General window layout and colors
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(33ccffee)
    col.inactive_border = rgba(595959aa)
    layout = dwindle
}

# Decoration settings for windows
decoration {
    rounding = 10
    blur {
        enabled = true
        size = 3
        passes = 1
        new_optimizations = true
    }

    # Modern shadow configuration
    dim_inactive = false
    dim_strength = 0.5
}

# Animation settings
animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# Layout settings
dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_on_top = true
}

# Gestures
gestures {
    workspace_swipe = true
    workspace_swipe_fingers = 3
}

# Window rules
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(blueman-manager)$
windowrulev2 = float, class:^(nm-connection-editor)$

# Fullscreen rules
windowrulev2 = immediate, class:^(steam_app).*$
windowrulev2 = immediate, class:^(gamescope).*$
windowrulev2 = noanim, class:^(steam_app).*$
windowrulev2 = fullscreen, class:^(steam_app).*$
windowrulev2 = stayfocused, title:^()$,class:^(steam)$
windowrulev2 = minsize 1 1, title:^()$,class:^(steam)$

# Additional Steam game fixes
windowrulev2 = immediate, class:^(steam_app_234140)$ # Mad Max specific rule
windowrulev2 = fullscreen, class:^(steam_app_234140)$ # Force fullscreen for Mad Max
#windowrulev2 = workspace 2 silent, class:^(steam_app_234140)$ # Optional: place on workspace 2

# Layer rules
layerrule = blur, waybar
layerrule = ignorezero, waybar
layerrule = noanim, waybar

# Key bindings
$mainMod = SUPER

# Basic bindings
bind = $mainMod, Return, exec, kitty
bind = $mainMod, C, killactive,
bind = $mainMod SHIFT, Q, exit,
bind = $mainMod, E, exec, thunar
bind = $mainMod, V, togglefloating,
bind = $mainMod, D, exec, wofi --show drun
bind = $mainMod, P, pseudo,
bind = $mainMod, J, togglesplit,
bind = $mainMod, F, fullscreen

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Mouse bindings
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Media keys
bind = , XF86AudioRaiseVolume, exec, pamixer -i 5
bind = , XF86AudioLowerVolume, exec, pamixer -d 5
bind = , XF86AudioMute, exec, pamixer -t
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous

# Brightness controls
bind = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Screenshot bindings
# Area selection -> swappy
bind = , Print, exec, grim -g "$(slurp)" - | swappy -f -
# Full screen -> swappy
bind = SHIFT, Print, exec, grim - | swappy -f -
# Active window -> swappy
bind = $mainMod, Print, exec, grim -g "$(hyprctl activewindow -j | jq -r '.at[0],\",\",(.at[1]),\" \",.size[0],\"x\",.size[1]' | tr -d '\n')" - | swappy -f - 

# Screen lock bindings
bind = $mainMod, L, exec, hyprctl dispatch dpms off && ~/.config/hypr/scripts/hdmi_off.sh #Locks screen
bind = $mainMod SHIFT, L, exec, hyprctl dispatch dpms on #Unlocks screen 