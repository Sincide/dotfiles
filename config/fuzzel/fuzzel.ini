[main]
# Fuzzel configuration
font=JetBrainsMono Nerd Font:size=12
icon-theme=Papirus
terminal=kitty
width=50
lines=10
horizontal-pad=20
vertical-pad=15
inner-pad=10
image-size-ratio=0.5
line-height=25
letter-spacing=0
cache=/home/martin/.cache/fuzzel

[colors]
background=0e1513ff
text=dde4e1ff
match=82d5c7ff
selection=005047ff
selection-text=9ef2e3ff
selection-match=b1ccc6ff
border=899390ff

[border]
width=2
radius=8

[dmenu]
exit-immediately-if-empty=yes

[key-bindings]
cancel=Escape Control+g Control+bracketleft Mod4+d
next=Down Control+j Control+n
prev=Up Control+p 