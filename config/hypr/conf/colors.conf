# Dynamic Hyprland Colors Generated by Matugen

# Color Definitions
$primary = rgb(82d5c7)
$primary_container = rgb(005047)
$secondary = rgb(b1ccc6)
$secondary_container = rgb(334b47)
$tertiary = rgb(adcae5)
$surface = rgb(0e1513)
$surface_variant = rgb(3f4946)
$background = rgb(0e1513)
$error = rgb(ffb4ab)
$outline = rgb(899390)
$outline_variant = rgb(3f4946)

# Text Colors
$on_primary = rgb(003731)
$on_secondary = rgb(1c3531)
$on_surface = rgb(dde4e1)
$on_background = rgb(dde4e1)

# Window Colors
general {
    col.active_border = $primary
    col.inactive_border = $outline_variant
}

# Group Colors
group {
    col.border_active = $primary
    col.border_inactive = $outline_variant
    col.border_locked_active = $tertiary
    col.border_locked_inactive = $outline
}

# Miscellaneous Colors
misc {
    background_color = $background
    col.splash = $primary
} 