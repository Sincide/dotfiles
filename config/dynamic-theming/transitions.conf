# Dynamic Theming Transition Configuration
# Controls wallpaper transition effects for swww

# Transition Mode Options:
# - fixed: Always use the specified transition
# - random: Randomly select from available transitions  
# - smart: Context-aware transition selection
# - category: Different transitions per wallpaper category
TRANSITION_MODE="random"

# Fixed Transition Settings (used when mode=fixed)
FIXED_TRANSITION_TYPE="wipe"
FIXED_TRANSITION_DURATION="2"
FIXED_TRANSITION_ANGLE="45"

# Random Transition Pool (used when mode=random)
# Space-separated list of transitions to randomly choose from
RANDOM_TRANSITIONS="fade left right top bottom wipe wave grow center any outer"

# Smart Transition Settings (used when mode=smart)
# Different transitions based on context
STARTUP_TRANSITION="fade"           # Gentle transition on startup
CATEGORY_TRANSITION="wipe"          # Default for category changes
QUICK_TRANSITION="simple"           # Fast transition for quick changes

# Category-Specific Transitions (used when mode=category)
TRANSITION_ABSTRACT="wave"          # Abstract wallpapers
TRANSITION_NATURE="grow"            # Nature wallpapers  
TRANSITION_DARK="fade"              # Dark wallpapers
TRANSITION_GAMING="left"            # Gaming wallpapers
TRANSITION_MINIMAL="simple"         # Minimal wallpapers
TRANSITION_SPACE="center"           # Space wallpapers

# Advanced Options
TRANSITION_DURATION_MIN="1"         # Minimum duration for random
TRANSITION_DURATION_MAX="4"         # Maximum duration for random
TRANSITION_FPS="30"                 # Frame rate
ENABLE_SPECIAL_EFFECTS="true"       # Enable special position/angle effects

# Bezier Curves for Fade Transitions
# Format: x1,y1,x2,y2 (see https://cubic-bezier.com)
FADE_BEZIER_SMOOTH="0.25,0.1,0.25,1.0"      # Smooth ease
FADE_BEZIER_DRAMATIC="0.68,-0.55,0.265,1.55" # Dramatic bounce
FADE_BEZIER_LINEAR="0.0,0.0,1.0,1.0"        # Linear
FADE_BEZIER_CURRENT="0.54,0,0.34,0.99"      # swww default

# Wave Effect Settings
WAVE_WIDTH="20"                     # Wave width
WAVE_HEIGHT="20"                    # Wave height

# Position Effects for Grow/Outer Transitions
# Options: center, top, bottom, left, right, top-left, top-right, bottom-left, bottom-right, random
GROW_POSITIONS="center top-left top-right bottom-left bottom-right" 