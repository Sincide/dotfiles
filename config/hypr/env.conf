# GTK Environment variables
env = GTK_THEME,catppuccin-mocha-blue-standard+default
env = GTK_CSD,1
env = GTK_OVERLAY_SCROLLING,1

# XDG Specifications
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# QT Variables
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_WAYLAND_FORCE_DPI,physical

# Wayland Specific
env = GDK_BACKEND,wayland,x11
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland
env = MOZ_ENABLE_WAYLAND,1
env = MOZ_DBUS_REMOTE,1
env = MOZ_WEBRENDER,1

# XWayland
env = XWAYLAND_NO_GLAMOR,1

# Java Applications
env = _JAVA_AWT_WM_NONREPARENTING,1
env = JAVA_TOOL_OPTIONS,-Dawt.useSystemAAFontSettings=on

# Hardware acceleration (AMD)
env = LIBVA_DRIVER_NAME,radeonsi
env = VDPAU_DRIVER,radeonsi
env = AMD_VULKAN_ICD,RADV
env = RADV_PERFTEST,gpl
env = mesa_glthread,true

# Common environment variables
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Adwaita

# These will be overridden by VM config if needed
env = WLR_DRM_NO_ATOMIC,1

# Screen sharing
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = RTC_USE_PIPEWIRE,true 