[style]
# Make items more distinguishable with a clearer color scheme
status_normal_fg = "#cdd6f4"
status_normal_bg = "#1e1e2e"
status_select_fg = "#1e1e2e"
status_select_bg = "#cba6f7"
status_code_fg = "#cba6f7" 

# Visually signal the current area with bright colors
current_normal_fg = "#cdd6f4"
current_normal_bg = "#313244"
current_select_fg = "#1e1e2e"
current_select_bg = "#cba6f7"

# Make other panels distinctive but muted
other_normal_fg = "#a6adc8"
other_normal_bg = "#1e1e2e"
other_select_fg = "#1e1e2e"
other_select_bg = "#89b4fa"

# Easily identified borders
border_symbol = "│"
border_style_fg = "#45475a"
border_style_bg = "#1e1e2e"

# Highlighted completion for easier use
completion_symbol = "…"
completion_style_fg = "#89b4fa"
completion_style_bg = "#1e1e2e"

# High visibility for hovered items
hovered_symbol = "➜"
hovered_style_fg = "#f9e2af"
hovered_style_bg = "#313244"

# Clear & visible status
jobcount_symbol = ""
jobcount_style_fg = "#a6e3a1"
jobcount_style_bg = "#1e1e2e"

# Visual file types for easier recognition
link_style_fg = "#89b4fa"
dir_style_fg = "#74c7ec"
file_style_fg = "#cdd6f4"
exec_style_fg = "#a6e3a1"
hidden_style_fg = "#7f849c"
image_style_fg = "#f9e2af"
video_style_fg = "#f38ba8"
audio_style_fg = "#fab387"
archive_style_fg = "#cba6f7"

# Good contrast for the progress bar
progress_label_style_fg = "#1e1e2e"
progress_label_style_bg = "#a6e3a1"
progress_filled_style_bg = "#a6e3a1"
progress_empty_style_bg = "#313244"

# Highlighting for search results
search_match_fg = "#1e1e2e"
search_match_bg = "#f9e2af"

# Format strings with nice readability
tab_normal_fg = "#cdd6f4"
tab_normal_bg = "#1e1e2e"
tab_select_fg = "#1e1e2e"
tab_select_bg = "#cba6f7"

# Entry for better visibility
input_fg = "#cdd6f4"
input_bg = "#313244" 