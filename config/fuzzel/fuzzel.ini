[main]
# Fuzzel configuration
font=JetBrainsMono Nerd Font:size=12
icon-theme=Papirus
terminal=kitty
width=50
lines=10
horizontal-pad=20
vertical-pad=15
inner-pad=10
image-size-ratio=0.5
line-height=25
letter-spacing=0

[colors]
background=111318ff
text=e2e2e9ff
match=adc6ffff
selection=2b4678ff
selection-text=d8e2ffff
selection-match=bfc6dcff
border=8e9099ff

[border]
width=2
radius=8

[dmenu]
exit-immediately-if-empty=yes

[key-bindings]
cancel=Escape Control+g Control+bracketleft Mod4+d
next=Down Control+j Control+n
prev=Up Control+p 