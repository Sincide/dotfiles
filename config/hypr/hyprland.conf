# Hyprland Configuration - Cleaned and Organized with Inline Comments
# Every line explained with what it does and possible values

# ====================
# VARIABLE DEFINITIONS
# ====================
$mainMod = SUPER                        # Define primary modifier key for keybinds

# ====================
# SOURCE MODULAR FILES

# ====================
# ====================
source = ~/.config/hypr/conf/env.conf           # Load environment variables (toolkit backends, themes, AMD)
source = ~/.config/hypr/conf/monitors.conf      # Load monitor configuration (resolution, position, scaling)
source = ~/.config/hypr/conf/keybinds.conf      # Load all keyboard shortcuts and mouse binds
source = ~/.config/hypr/conf/windowrules.conf   # Load window-specific rules (size, position, workspace)
source = ~/.config/hypr/conf/startup.conf       # Load autostart applications and commands
source = ~/.config/hypr/conf/decoration.conf    # Load visual settings (borders, shadows, blur, rounding)
source = ~/.config/hypr/conf/workspaces.conf    # Load workspace-specific rules and layouts
source = ~/.config/hypr/conf/animations.conf    # Load animation curves and timing settings
source = ~/.config/hypr/conf/colors.conf
source = ~/.config/hypr/conf/general.conf
source = ~/.config/hypr/conf/input.conf

# ====================
# INPUT CONFIGURATION
# ====================
input {
    kb_layout = se                      # Keyboard layout (se=Swedish, us=US, gb=UK, de=German, etc.)
    kb_variant =                        # Keyboard variant (empty=default, dvorak, colemak, etc.)
    kb_model =                          # Keyboard model (empty=autodetect, pc104, etc.)
    kb_options =                        # XKB options (caps:ctrl_modifier, grp:alt_shift_toggle, etc.)
    kb_rules =                          # XKB rules (empty=default, evdev, etc.)
    numlock_by_default = true           # Auto-enable numlock on startup (true/false)
    follow_mouse = 1                    # Focus follows mouse (0=disabled, 1=loose, 2=strict, 3=loose+float)
    sensitivity = 0                     # Mouse sensitivity modifier (-1.0 to 1.0, 0=no change)

    touchpad {
        natural_scroll = false          # Reverse scroll direction (false=traditional, true=natural/macOS)
    }
}

# ====================
# GENERAL SETTINGS
# ====================
general {
    layout = dwindle                    # Default layout (dwindle=binary tree, master=master/slave)
    allow_tearing = false               # Allow screen tearing for gaming (true=lower latency, false=smooth)
}

# ====================
# LAYOUT CONFIGURATIONS
# ====================

# Dwindle Layout (Binary Tree Tiling)
dwindle {
    pseudotile = true                   # Keep floating window sizes when tiled (true/false)
    preserve_split = true               # Maintain split direction when windows close (true/false)
}

# Master Layout (Master/Slave style)
master {
    new_status = slave                  # Where new windows open (master/slave/inherit)
}

# ====================
# BEHAVIOR SETTINGS
# ====================

# Miscellaneous Settings
misc {
    force_default_wallpaper = 0         # Force Hyprland anime wallpaper (0=use yours, 1=force default)
    disable_hyprland_logo = true        # Remove logo from empty workspaces (true/false)
    disable_splash_rendering = true     # Disable startup splash text (true=faster startup, false=show splash)
}

# Touch and Gesture Controls
gestures {
    workspace_swipe = true              # Enable touchpad workspace switching (true/false)
    workspace_swipe_fingers = 3         # Fingers needed for workspace swipe (2/3/4)
}

# ====================
# SYSTEM CONFIGURATIONS
# ====================

# Debug and Logging Settings
debug {
    overlay = false                     # Show performance overlay on screen (true/false)
    damage_tracking = 2                 # Damage tracking method (0=none, 1=monitor, 2=full)
    enable_stdout_logs = false          # Print logs to terminal (true=verbose, false=quiet)
    manual_crash = 0                    # Manual crash trigger for debugging (0=normal, 1+=crash)
    suppress_errors = false             # Hide error messages (true=hide, false=show)
    disable_logs = true                 # Completely disable logging (true=no logs, false=enable)
    disable_time = true                 # Remove timestamps from logs (true=no time, false=timestamps)
    error_limit = 5                     # Maximum errors to display before stopping
    error_position = 0                  # Error display position (0=top, 1=bottom)
    colored_stdout_logs = true          # Use colors in terminal logs (true/false)
}

# Cursor Behavior and Appearance
cursor {
    sync_gsettings_theme = true         # Sync cursor with GTK theme settings (true/false)
    no_hardware_cursors = 2             # Hardware cursor usage (0=use hw, 1=force sw, 2=auto)
    zoom_factor = 1.0                   # Cursor size multiplier (1.0=normal, 2.0=double size)
    zoom_rigid = false                  # Pixelated cursor scaling (true=pixelated, false=smooth)
    enable_hyprcursor = true            # Use Hyprland cursor format (true=modern, false=legacy)
    hide_on_key_press = false           # Hide cursor while typing (true/false)
    hide_on_touch = true                # Hide cursor on touch input (true/false)
    inactive_timeout = 0                # Hide cursor after inactivity seconds (0=never, >0=timeout)
    no_warps = false                    # Disable cursor warping (true=no warp, false=allow warp)
    persistent_warps = false            # Remember cursor per workspace (true/false)
    warp_on_change_workspace = 0        # Warp cursor on workspace switch (0=no, 1=center, 2=last pos)
    warp_on_toggle_special = 0          # Warp cursor on special workspace toggle (0=no, 1=center)
    default_monitor =                   # Default monitor for cursor (empty=current, name=specific)
    use_cpu_buffer = 2                  # CPU buffer for cursor rendering (0=never, 1=always, 2=auto)
    warp_back_after_non_mouse_input = false  # Return cursor after keyboard input (true/false)
    hotspot_padding = 1                 # Cursor click detection padding in pixels
    min_refresh_rate = 24               # Minimum cursor refresh rate in Hz
    no_break_fs_vrr = 2                 # VRR behavior with fullscreen cursor (0=break, 1=preserve, 2=auto)
}

# Graphics Rendering Configuration
render {
    explicit_sync = 2                   # Explicit GPU synchronization (0=off, 1=on, 2=auto)
    explicit_sync_kms = 2               # Explicit sync for kernel modesetting (0=off, 1=on, 2=auto)
    direct_scanout = 0                  # Direct scanout for fullscreen (0=off, 1=on - may cause issues)
    expand_undersized_textures = true   # Expand small textures to avoid artifacts (true/false)
    xp_mode = false                     # Experimental rendering features (true=experimental, false=stable)
    cm_fs_passthrough = 2               # Color management fullscreen passthrough (0=off, 1=on, 2=auto)
    cm_enabled = true                   # Enable color management system (true/false)
    send_content_type = true            # Send content type hints to displays (true/false)
}

# OpenGL Graphics Configuration
opengl {
    nvidia_anti_flicker = true          # NVIDIA anti-flicker workaround (true=reduce flicker, false=normal)
}

# XWayland Compatibility Layer
xwayland {
    enabled = true                      # Enable XWayland for X11 apps (true=compatible, false=Wayland-only)
    use_nearest_neighbor = true         # XWayland scaling method (true=crisp/pixelated, false=smooth/blurry)
    force_zero_scaling = false          # Force 1:1 XWayland scaling (true=no scaling, false=allow scaling)
    create_abstract_socket = false      # XWayland socket type (true=abstract, false=filesystem)
}

# Hyprland Ecosystem Settings
ecosystem {
    no_update_news = false              # Disable update notifications (true=no news, false=show updates)
    no_donation_nag = false             # Disable donation prompts (true=no prompts, false=show prompts)
    enforce_permissions = false         # Enforce permission system (true=strict, false=relaxed)
}

# Experimental Features (Unstable)
experimental {
    xx_color_management_v4 = false      # Experimental color management v4 (true=cutting-edge, false=stable)
}

# ====================
# CONFIGURATION TIPS
# ====================
#
# RELOAD: hyprctl reload
# COMMON LAYOUTS: dwindle (binary tree), master (dwm-style)
# PERFORMANCE: Set disable_logs=true, damage_tracking=2, allow_tearing=true for gaming
# CURSOR SIZE: Change XCURSOR_SIZE (16/24/32/48) for different cursor sizes
# KEYBOARD: Change kb_layout (us/gb/de/fr/se/etc) for your language
# TOUCHPAD: Set natural_scroll=true for macOS-like scrolling
# AMD GPU: All AMD optimizations included, remove RADV_PERFTEST for older GPUs
# DEBUGGING: Set enable_stdout_logs=true and disable_logs=false for troubleshooting

