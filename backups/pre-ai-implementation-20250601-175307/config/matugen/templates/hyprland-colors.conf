# Dynamic Hyprland Colors Generated by Matugen

# Color Definitions
$primary = rgb({{colors.primary.dark.hex_stripped}})
$primary_container = rgb({{colors.primary_container.dark.hex_stripped}})
$secondary = rgb({{colors.secondary.dark.hex_stripped}})
$secondary_container = rgb({{colors.secondary_container.dark.hex_stripped}})
$tertiary = rgb({{colors.tertiary.dark.hex_stripped}})
$surface = rgb({{colors.surface.dark.hex_stripped}})
$surface_variant = rgb({{colors.surface_variant.dark.hex_stripped}})
$background = rgb({{colors.background.dark.hex_stripped}})
$error = rgb({{colors.error.dark.hex_stripped}})
$outline = rgb({{colors.outline.dark.hex_stripped}})
$outline_variant = rgb({{colors.outline_variant.dark.hex_stripped}})

# Text Colors
$on_primary = rgb({{colors.on_primary.dark.hex_stripped}})
$on_secondary = rgb({{colors.on_secondary.dark.hex_stripped}})
$on_surface = rgb({{colors.on_surface.dark.hex_stripped}})
$on_background = rgb({{colors.on_background.dark.hex_stripped}})

# Window Colors
general {
    col.active_border = $primary
    col.inactive_border = $outline_variant
}

# Group Colors
group {
    col.border_active = $primary
    col.border_inactive = $outline_variant
    col.border_locked_active = $tertiary
    col.border_locked_inactive = $outline
}

# Miscellaneous Colors
misc {
    background_color = $background
    col.splash = $primary
} 