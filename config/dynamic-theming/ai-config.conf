# AI Enhancement Configuration for Dynamic Theming
# Created: 2025-06-01
# Purpose: Control AI-powered color optimization features

# ===========================================
# AI COLOR OPTIMIZATION SETTINGS
# ===========================================

# Enable/disable AI color optimization
# Options: true | false
# Default: false (for stability)
ENABLE_AI_OPTIMIZATION=true

# AI pipeline debug mode
# Options: true | false
# Default: false
AI_DEBUG_MODE=false

# ===========================================
# AI PERFORMANCE SETTINGS
# ===========================================

# Maximum time to wait for AI processing (seconds)
AI_TIMEOUT=3

# Enable AI caching (reuse AI analysis for same wallpaper)
# Options: true | false
# Default: true
AI_CACHING_ENABLED=true

# ===========================================
# AI FEATURE TOGGLES
# ===========================================

# Enable color harmony analysis
# Options: true | false
# Default: true
ENABLE_HARMONY_ANALYSIS=true

# Enable accessibility optimization
# Options: true | false
# Default: true
ENABLE_ACCESSIBILITY_OPTIMIZATION=true

# ===========================================
# NOTIFICATION SETTINGS
# ===========================================

# Show AI status in notifications
# Options: true | false
# Default: true
SHOW_AI_STATUS=true

# ===========================================
# USAGE INSTRUCTIONS
# ===========================================

# To enable AI optimization:
# 1. Set ENABLE_AI_OPTIMIZATION=true
# 2. Save this file
# 3. Run wallpaper selector with: ./scripts/wallpaper-selector.sh
# 4. Or test directly with: ENABLE_AI_OPTIMIZATION=true ./scripts/wallpaper-theme-changer-optimized.sh assets/wallpapers/dark/evilpuccin.png

# To test AI vs Standard comparison:
# Standard: ./scripts/wallpaper-theme-changer-optimized.sh assets/wallpapers/dark/evilpuccin.png
# AI:       ENABLE_AI_OPTIMIZATION=true ./scripts/wallpaper-theme-changer-optimized.sh assets/wallpapers/dark/evilpuccin.png

# ===========================================
# TROUBLESHOOTING
# ===========================================

# If AI fails:
# - Check logs in: /tmp/wallpaper-theme-optimized.log
# - Check AI logs in: /tmp/ai-*.log
# - System falls back to standard matugen automatically

# Performance monitoring:
# - AI processing time should be under 1 second
# - Total theme change should remain under 2 seconds
# - Check timing in logs for optimization opportunities

AI_MODE="enhanced"
