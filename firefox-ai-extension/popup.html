<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Dynamic Colors</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 350px;
      min-height: 500px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      font-size: 14px;
    }
    .header {
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      padding: 20px 16px;
      text-align: center;
      color: white;
    }
    .header h1 {
      font-size: 18px;
      font-weight: 600;
      margin: 0;
    }
    .content {
      padding: 16px;
    }
    .status {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      border: 1px solid;
      font-weight: 500;
      text-align: center;
    }
    .status.enabled {
      background: #0f1419;
      border-color: #a6e3a1;
      color: #a6e3a1;
    }
    .status.disabled {
      background: #1a0f14;
      border-color: #f38ba8;
      color: #f38ba8;
    }
    .colors-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }
    .color-swatch {
      height: 50px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      text-shadow: 0 1px 2px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .controls {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .control-group {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .toggle {
      position: relative;
      width: 48px;
      height: 26px;
      background: #45475a;
      border-radius: 13px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .toggle.active {
      background: #6366f1;
    }
    .toggle::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 22px;
      height: 22px;
      background: white;
      border-radius: 50%;
      transition: transform 0.3s;
    }
    .toggle.active::after {
      transform: translateX(22px);
    }
    .button {
      background: #6366f1;
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
    }
    .button:hover {
      background: #5855eb;
    }
    .button.secondary {
      background: #45475a;
      color: #cdd6f4;
    }
    .stats {
      margin-top: 16px;
      padding: 12px;
      background: #181825;
      border-radius: 8px;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      text-align: center;
    }
    .stat-value {
      font-size: 18px;
      font-weight: 600;
      color: #6366f1;
    }
    .stat-label {
      font-size: 11px;
      color: #a6adc8;
      text-transform: uppercase;
    }
    .loading {
      text-align: center;
      padding: 40px 20px;
      color: #a6adc8;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🤖 AI Dynamic Colors</h1>
  </div>
  <div class="content">
    <div class="loading" id="loading">
      Loading AI colors...
    </div>
    <div id="main-content" style="display: none;">
      <div class="status" id="status">
        <div id="status-text">🟢 AI colors active</div>
      </div>
      <div class="colors-grid" id="colors-grid">
        <!-- Colors populated by JS -->
      </div>
      <div class="controls">
        <div class="control-group">
          <span>Enable AI Colors</span>
          <div class="toggle active" id="enable-toggle"></div>
        </div>
        <div class="control-group">
          <span>Aggressive Mode</span>
          <div class="toggle" id="aggressive-toggle"></div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
          <button class="button" id="refresh-btn">🔄 Refresh</button>
          <button class="button secondary" id="options-btn">⚙️ Options</button>
        </div>
      </div>
      <div class="stats">
        <div class="stats-grid">
          <div>
            <div class="stat-value" id="harmony-score">--</div>
            <div class="stat-label">Harmony</div>
          </div>
          <div>
            <div class="stat-value" id="accessibility-level">--</div>
            <div class="stat-label">Access</div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
